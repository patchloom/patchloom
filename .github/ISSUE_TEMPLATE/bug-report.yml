name: Bug report
description: Report a reproducible Patchloom bug or regression
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        Please include a minimal reproduction and the exact observed behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest sequence of steps that reproduces the issue.
      placeholder: |
        1. Run `...`
        2. Edit `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste error messages, diffs, or logs if relevant.
      render: shell
  - type: input
    id: version
    attributes:
      label: Patchloom version
      placeholder: v0.1.0
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: ubuntu 24.04, macOS 15, Windows 11, etc.
    validations:
      required: false
