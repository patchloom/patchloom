name: Benchmarks

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      scales:
        description: "Corpus scales to benchmark (space-separated)"
        default: "small medium"
        type: string

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cli-bench:
    permissions:
      contents: write  # upload release assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install hyperfine
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2
        with:
          tool: hyperfine@1.20.0

      - name: Install jq and yq
        env:
          JQ_VERSION: jq-1.8.1
          YQ_VERSION: v4.53.2
          INSTALL_DIR: ${{ runner.temp }}/bench-bin
        run: |
          mkdir -p "$INSTALL_DIR"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  jq_suffix="linux-amd64";  yq_suffix="linux_amd64" ;;
            Linux-aarch64) jq_suffix="linux-arm64";   yq_suffix="linux_arm64" ;;
            Darwin-x86_64) jq_suffix="macos-amd64";   yq_suffix="darwin_amd64" ;;
            Darwin-arm64)  jq_suffix="macos-arm64";    yq_suffix="darwin_arm64" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          curl --retry 5 --retry-all-errors --retry-delay 2 -sSfL \
            -o "$INSTALL_DIR/jq" \
            "https://github.com/jqlang/jq/releases/download/${JQ_VERSION}/jq-${jq_suffix}"
          curl --retry 5 --retry-all-errors --retry-delay 2 -sSfL \
            -o "$INSTALL_DIR/yq" \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${yq_suffix}"
          chmod +x "$INSTALL_DIR/jq" "$INSTALL_DIR/yq"
          printf '%s\n' "$INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Verify benchmark tools
        run: |
          hyperfine --version
          jq --version
          yq --version

      - name: Run CLI benchmarks
        env:
          BENCH_SCALES: ${{ inputs.scales || 'small medium' }}
        run: |
          cd benches/cli
          bash run.sh "$BENCH_SCALES"

      - name: Upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cli-bench-results
          path: benches/cli/results/*.md
          retention-days: 14

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in benches/cli/results/*.md; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
