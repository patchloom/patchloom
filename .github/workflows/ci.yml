name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    # Use the self-hosted runner for trusted events (push, workflow_dispatch,
    # and PRs from the same repo). Fork PRs fall back to GitHub-hosted to
    # prevent arbitrary code execution on the self-hosted machine.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJson('["self-hosted","Linux","X64"]') }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Run checks
        run: make check

  ci-windows:
    # GitHub-hosted Windows runners are unavailable while this repo stays
    # private and hosted-runner billing is blocked.
    if: ${{ !github.event.repository.private }}
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Disable autocrlf
        run: git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (all features including MCP)
        run: cargo build --all-features

      - name: Unit tests (including MCP)
        run: cargo test --lib --all-features

      - name: Integration tests (including MCP)
        run: cargo test --test integration --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  ci-macos:
    # GitHub-hosted macOS runners are unavailable while this repo stays
    # private and hosted-runner billing is blocked.
    if: ${{ !github.event.repository.private }}
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests (including MCP)
        run: cargo test --lib --all-features

      - name: Integration tests (including MCP)
        run: cargo test --test integration --all-features

  msrv:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJson('["self-hosted","Linux","X64"]') }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV (default features)
        run: cargo check --all-targets

      - name: Check MSRV (all features)
        run: cargo check --all-targets --all-features

  coverage:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJson('["self-hosted","Linux","X64"]') }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: |
          if [[ -x /home/linuxbrew/.linuxbrew/bin/llvm-profdata && -x /home/linuxbrew/.linuxbrew/bin/llvm-cov ]]; then
            export LLVM_PROFDATA=/home/linuxbrew/.linuxbrew/bin/llvm-profdata
            export LLVM_COV=/home/linuxbrew/.linuxbrew/bin/llvm-cov
          fi
          cargo llvm-cov --all-features --lib --test integration --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

  bench:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJson('["self-hosted","Linux","X64"]') }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Install hyperfine
        uses: taiki-e/install-action@v2
        with:
          tool: hyperfine

      - name: Build release binary
        run: cargo build --release

      - name: Create test fixtures
        run: |
          echo '{"name": "test", "version": "1.0.0"}' > /tmp/bench.json
          echo "hello world" > /tmp/bench.txt

      - name: Benchmark search (must be under 50ms)
        run: hyperfine --warmup 3 --min-runs 20 -N './target/release/patchloom search "hello" /tmp/bench.txt' --max-runs 100

      - name: Benchmark doc get (must be under 50ms)
        run: hyperfine --warmup 3 --min-runs 20 -N './target/release/patchloom --json doc get /tmp/bench.json name' --max-runs 100

      - name: Benchmark replace dry-run (must be under 50ms)
        run: hyperfine --warmup 3 --min-runs 20 -N './target/release/patchloom replace --from hello --to world /tmp/bench.txt' --max-runs 100

  audit:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || fromJson('["self-hosted","Linux","X64"]') }}
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run audit
        run: cargo audit
