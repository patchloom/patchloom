name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: read

jobs:
  ci:
    # Use the self-hosted runner for trusted events (push, workflow_dispatch,
    # and PRs from the same repo). Fork PRs fall back to GitHub-hosted to
    # prevent arbitrary code execution on the self-hosted machine.
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || 'self-hosted' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Run checks
        run: make check

  ci-windows:
    # GitHub-hosted Windows runners are unavailable while this repo stays
    # private and hosted-runner billing is blocked.
    if: ${{ !github.event.repository.private }}
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Disable autocrlf
        run: git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (all features including MCP)
        run: cargo build --all-features

      - name: Unit tests (including MCP)
        run: cargo test --lib --all-features

      - name: Integration tests (including MCP)
        run: cargo test --test integration --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  ci-macos:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'macos-latest' || fromJson('["self-hosted","macOS","ARM64"]') }}
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Run checks
        run: make check

  msrv:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || 'self-hosted' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV (default features)
        run: cargo check --all-targets

      - name: Check MSRV (all features)
        run: cargo check --all-targets --all-features

  msrv-macos:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'macos-latest' || fromJson('["self-hosted","macOS","ARM64"]') }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV (default features)
        run: cargo check --all-targets

      - name: Check MSRV (all features)
        run: cargo check --all-targets --all-features

  coverage:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || 'self-hosted' }}
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: |
          if [[ -x /home/linuxbrew/.linuxbrew/bin/llvm-profdata && -x /home/linuxbrew/.linuxbrew/bin/llvm-cov ]]; then
            export LLVM_PROFDATA=/home/linuxbrew/.linuxbrew/bin/llvm-profdata
            export LLVM_COV=/home/linuxbrew/.linuxbrew/bin/llvm-cov
          fi
          cargo llvm-cov --all-features --lib --test integration --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: lcov.info

      - name: Upload to Codecov
        if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  bench:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || 'self-hosted' }}
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (fork PRs on GitHub-hosted runners)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: Swatinem/rust-cache@v2

      - name: Install hyperfine
        uses: taiki-e/install-action@v2
        with:
          tool: hyperfine@1.20.0

      - name: Download baseline
        id: baseline
        continue-on-error: true
        run: |
          run_id=$(gh run list --branch main --workflow ci.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$run_id" ]; then
            gh run download "$run_id" -n benchmark-results -D "$RUNNER_TEMP/baseline" && echo "found=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build release binary
        run: cargo build --release

      - name: Create test fixtures
        run: |
          echo '{"name": "test", "version": "1.0.0"}' > "$RUNNER_TEMP/bench.json"
          echo "hello world" > "$RUNNER_TEMP/bench.txt"

      - name: Benchmark search (must be under 50ms)
        run: |
          bench_txt="$RUNNER_TEMP/bench.txt"
          bench_json="$RUNNER_TEMP/bench-search.json"
          hyperfine --warmup 3 --min-runs 20 -N \
            --export-json "$bench_json" \
            "./target/release/patchloom search hello $bench_txt" \
            --max-runs 100
          python3 benches/ci/check_threshold.py "$bench_json" "search"

      - name: Benchmark doc get (must be under 50ms)
        run: |
          bench_json_file="$RUNNER_TEMP/bench.json"
          bench_json="$RUNNER_TEMP/bench-doc-get.json"
          hyperfine --warmup 3 --min-runs 20 -N \
            --export-json "$bench_json" \
            "./target/release/patchloom --json doc get $bench_json_file name" \
            --max-runs 100
          python3 benches/ci/check_threshold.py "$bench_json" "doc get"

      - name: Benchmark replace dry-run (must be under 50ms)
        run: |
          bench_txt="$RUNNER_TEMP/bench.txt"
          bench_json="$RUNNER_TEMP/bench-replace-dry-run.json"
          hyperfine --warmup 3 --min-runs 20 -N \
            --export-json "$bench_json" \
            "./target/release/patchloom replace hello --to world $bench_txt" \
            --max-runs 100
          python3 benches/ci/check_threshold.py "$bench_json" "replace dry-run"

      - name: Benchmark summary
        if: always()
        run: python3 benches/ci/bench_summary.py "$RUNNER_TEMP" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: ${{ runner.temp }}/bench-*.json
          retention-days: 90

      - name: Compare against baseline
        if: always() && steps.baseline.outputs.found == 'true'
        run: python3 benches/ci/bench_compare.py "$RUNNER_TEMP/baseline" "$RUNNER_TEMP" | tee -a "$GITHUB_STEP_SUMMARY"

  audit:
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && 'ubuntu-latest' || 'self-hosted' }}
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run audit
        run: cargo audit
