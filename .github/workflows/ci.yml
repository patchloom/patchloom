name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group: {}
  schedule:
    - cron: "0 6 * * 1"  # Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  actions: read

jobs:
  changes:
    # Detect whether source code changed. On non-PR events (push, schedule,
    # merge_group) this job is skipped, which causes all downstream jobs to
    # run unconditionally via the `needs.changes.result == 'skipped'` guard.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'Cargo.*'
              - 'tests/**'
              - 'Makefile'
              - 'fuzz/**'
              - 'benches/**'
              - '.github/actions/**'
              - '.github/workflows/ci.yml'

  build-and-test:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Run checks
        run: make check

  ci-windows:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Disable autocrlf
        run: git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy

      - name: Build (all features including MCP)
        run: cargo build --all-features

      - name: Unit tests (including MCP)
        run: cargo test --lib --all-features

      - name: Integration tests (including MCP)
        run: cargo test --test integration --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  ci-macos:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Run checks
        run: make check

  msrv:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.95"

      - name: Check MSRV (default features)
        run: cargo check --all-targets

      - name: Check MSRV (all features)
        run: cargo check --all-targets --all-features

  msrv-macos:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.95"

      - name: Check MSRV (default features)
        run: cargo check --all-targets

      - name: Check MSRV (all features)
        run: cargo check --all-targets --all-features

  coverage:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      code-quality: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-features --lib --test integration --cobertura --output-path coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: coverage.xml
          language: Rust
          label: code-coverage/rust

      - name: Extract coverage percentage
        id: cov
        run: |
          pct=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().get('line-rate', 0))
          print(f'{rate * 100:.1f}')
          ")
          echo "percentage=$pct" >> "$GITHUB_OUTPUT"

      - name: Determine badge color
        id: color
        run: |
          pct="${{ steps.cov.outputs.percentage }}"
          # Compare as integer (strip decimal)
          int_pct=${pct%.*}
          if [ "$int_pct" -ge 90 ]; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [ "$int_pct" -ge 80 ]; then
            echo "color=green" >> "$GITHUB_OUTPUT"
          elif [ "$int_pct" -ge 70 ]; then
            echo "color=yellowgreen" >> "$GITHUB_OUTPUT"
          elif [ "$int_pct" -ge 60 ]; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract crate version
        id: version
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fetch crates.io download count
        id: downloads
        run: |
          count=$(python3 -c "
          import json, urllib.request
          req = urllib.request.Request(
              'https://crates.io/api/v1/crates/patchloom',
              headers={'User-Agent': 'patchloom-ci'},
          )
          with urllib.request.urlopen(req) as resp:
              print(json.load(resp)['crate']['downloads'])
          ")
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 6a26adf6bfae45f530465f626c9154f4
          filename: coverage.json
          label: coverage
          message: ${{ steps.cov.outputs.percentage }}%
          color: ${{ steps.color.outputs.color }}

      - name: Update release badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 6a26adf6bfae45f530465f626c9154f4
          filename: release.json
          label: release
          message: v${{ steps.version.outputs.version }}
          color: blue

      - name: Update crates.io version badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 6a26adf6bfae45f530465f626c9154f4
          filename: crate-version.json
          label: crates.io
          message: v${{ steps.version.outputs.version }}
          color: orange

      - name: Update crates.io downloads badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 6a26adf6bfae45f530465f626c9154f4
          filename: crates-downloads.json
          label: downloads
          message: ${{ steps.downloads.outputs.count }}
          color: blue

  bench:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install hyperfine
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: hyperfine@1.20.0

      - name: Download baseline
        id: baseline
        continue-on-error: true
        run: |
          run_id=$(gh run list --branch main --workflow ci.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -n "$run_id" ]; then
            gh run download "$run_id" -n benchmark-results -D "$RUNNER_TEMP/baseline" && echo "found=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build release binary
        run: cargo build --release

      - name: Create test fixtures
        run: |
          echo '{"name": "test", "version": "1.0.0"}' > "$RUNNER_TEMP/bench.json"
          echo "hello world" > "$RUNNER_TEMP/bench.txt"

      - name: Benchmark search (must be under 50ms)
        run: |
          bench_txt="$RUNNER_TEMP/bench.txt"
          bench_json="$RUNNER_TEMP/bench-search.json"
          hyperfine --warmup 3 --min-runs 20 -N \
            --export-json "$bench_json" \
            "./target/release/patchloom search hello $bench_txt" \
            --max-runs 100
          python3 benches/ci/check_threshold.py "$bench_json" "search"

      - name: Benchmark doc get (must be under 50ms)
        run: |
          bench_json_file="$RUNNER_TEMP/bench.json"
          bench_json="$RUNNER_TEMP/bench-doc-get.json"
          hyperfine --warmup 3 --min-runs 20 -N \
            --export-json "$bench_json" \
            "./target/release/patchloom --json doc get $bench_json_file name" \
            --max-runs 100
          python3 benches/ci/check_threshold.py "$bench_json" "doc get"

      - name: Benchmark replace dry-run (must be under 50ms)
        run: |
          bench_txt="$RUNNER_TEMP/bench.txt"
          bench_json="$RUNNER_TEMP/bench-replace-dry-run.json"
          hyperfine --warmup 3 --min-runs 20 -N -i \
            --export-json "$bench_json" \
            "./target/release/patchloom replace hello --new world $bench_txt" \
            --max-runs 100
          python3 benches/ci/check_threshold.py "$bench_json" "replace dry-run"

      - name: Benchmark summary
        if: always()
        run: python3 benches/ci/bench_summary.py "$RUNNER_TEMP" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results
          path: ${{ runner.temp }}/bench-*.json
          retention-days: 90

      - name: Compare against baseline
        if: always() && steps.baseline.outputs.found == 'true'
        run: python3 benches/ci/bench_compare.py "$RUNNER_TEMP/baseline" "$RUNNER_TEMP" | tee -a "$GITHUB_STEP_SUMMARY"

  fuzz:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_selector_parse
          - fuzz_patch_parse
          - fuzz_patch_apply
          - fuzz_batch_tokenize
          - fuzz_selector_eval
          - fuzz_doc_parse
          - fuzz_containment_check
          - fuzz_fallback_resolve
          - fuzz_ast_parse
          - fuzz_md_heading
          - fuzz_replace_regex
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          cache-workspaces: |
            .
            fuzz
          shared-key: fuzz
          cache-on-failure: "true"

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-fuzz

      - name: Fuzz ${{ matrix.target }}
        env:
          RUSTUP_TOOLCHAIN: nightly
        run: cargo fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -max_total_time=60

  agent-dry-run:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install --require-hashes -r tests/agent/requirements.txt

      - name: Agent benchmark dry run
        run: cd tests/agent && pytest test_bench.py::test_dry_run_prompts -v -s --dry-run-prompts

  semver-checks:
    # Only run on release PRs where the version bump is proposed.
    # Regular development PRs may accumulate breaking changes that are
    # expected until the next release.
    if: startsWith(github.head_ref, 'release-please-')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          feature-group: all-features

  audit:
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install cargo-audit
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-audit

      - name: Run audit
        run: cargo audit

  ci:
    # Lightweight gate that satisfies the "ci" required status check.
    # Reports success when build-and-test passes OR was skipped (docs-only PR).
    needs: [build-and-test, ci-windows, ci-macos, msrv, msrv-macos, coverage, bench, fuzz, agent-dry-run, audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Gate
        run: |
          results=("$BUILD" "$WINDOWS" "$MACOS" "$MSRV" "$MSRV_MACOS" "$COV" "$BENCH" "$FUZZ" "$AGENT" "$AUDIT")
          for r in "${results[@]}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Upstream job failed or was cancelled: $r"
              exit 1
            fi
          done
        env:
          BUILD: ${{ needs.build-and-test.result }}
          WINDOWS: ${{ needs.ci-windows.result }}
          MACOS: ${{ needs.ci-macos.result }}
          MSRV: ${{ needs.msrv.result }}
          MSRV_MACOS: ${{ needs.msrv-macos.result }}
          COV: ${{ needs.coverage.result }}
          BENCH: ${{ needs.bench.result }}
          FUZZ: ${{ needs.fuzz.result }}
          AGENT: ${{ needs.agent-dry-run.result }}
          AUDIT: ${{ needs.audit.result }}
