# Requires GitHub Advanced Security (GHAS), which is free for public repos
# but paid for private repos. Uncomment the jobs block when the repo becomes
# public, then delete this comment.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # Monday 8am UTC
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

