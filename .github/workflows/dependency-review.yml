# Requires GitHub Advanced Security (GHAS), which is free for public repos
# but paid for private repos. Uncomment the jobs block when the repo becomes
# public, then delete this comment.

name: Dependency Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

