name: FOSSA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fossa-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  license-scan:
    name: License Scan
    # Requires FOSSA_API_KEY secret (https://app.fossa.com).
    # Skips Dependabot PRs (no access to repo secrets).
    # Skips private repos (set up FOSSA after going public).
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !github.event.repository.private
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Check FOSSA API key
        id: check-key
        run: |
          if [ -z "$FOSSA_API_KEY" ]; then
            echo "FOSSA_API_KEY not configured, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
      - name: Install FOSSA CLI
        if: steps.check-key.outputs.skip != 'true'
        env:
          FOSSA_VERSION: "3.17.10"
        run: |
          curl -fsSL -o "fossa_${FOSSA_VERSION}_linux_amd64.tar.gz" \
            "https://github.com/fossas/fossa-cli/releases/download/v${FOSSA_VERSION}/fossa_${FOSSA_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "fossa_${FOSSA_VERSION}_linux_amd64.tar.gz.sha256" \
            "https://github.com/fossas/fossa-cli/releases/download/v${FOSSA_VERSION}/fossa_${FOSSA_VERSION}_linux_amd64.tar.gz.sha256"
          sha256sum -c "fossa_${FOSSA_VERSION}_linux_amd64.tar.gz.sha256"
          tar xzf "fossa_${FOSSA_VERSION}_linux_amd64.tar.gz" fossa
          sudo install fossa /usr/local/bin/fossa
      - name: Run FOSSA analysis
        if: steps.check-key.outputs.skip != 'true'
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
        run: fossa analyze
      # fossa test disabled: default policy flags apache-2.0 WITH
      # llvm-exception (7 crates) and LGPL-2.1-or-later on r-efi.
      # All are false positives. Re-enable with a filter script when
      # the free tier supports persistent ignore rules or policy edits.
