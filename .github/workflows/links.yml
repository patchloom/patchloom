name: Links

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "lychee.toml"
      - ".github/workflows/links.yml"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1"  # Monday noon UTC
  workflow_dispatch:

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            docs:
              - '**/*.md'
              - 'lychee.toml'
              - '.github/workflows/links.yml'

  links-run:
    name: Links Run
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.docs == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --no-progress --config lychee.toml '**/*.md'
          fail: true

  check-links:
    # Lightweight gate satisfying the "Check Links" required status check.
    name: Check Links
    needs: [links-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Gate
        run: |
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            echo "Link check failed or was cancelled"
            exit 1
          fi
        env:
          RESULT: ${{ needs.links-run.result }}
