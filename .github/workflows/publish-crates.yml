name: Publish crates.io package

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      PLAN: ${{ inputs.plan }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Validate dist plan input
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os

          plan = json.loads(os.environ["PLAN"])
          if not plan.get("releases"):
              raise SystemExit("dist plan contained no releases")
          PY

      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Verify package metadata
        run: cargo package --locked --package patchloom

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --package patchloom
