#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "read"
  "pull-requests": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    branches: [main]
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # release-please creates a PR that tracks conventional commits.
  # When merged, it bumps the version, updates CHANGELOG.md, and tags.
  release-please:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.AUTO_APPROVE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When release-please bumps the version in Cargo.toml, PATCHLOOM.md
  # becomes stale because it embeds the `patchloom agent-rules` output
  # which includes the version.  This job auto-regenerates it.
  sync-generated-files:
    needs: [release-please]
    # Run when release-please has an open PR but did not create a release.
    # The pr output is empty when no PR was created or updated.
    if: >-
      needs.release-please.outputs.release_created != 'true' &&
      needs.release-please.outputs.pr != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.AUTO_APPROVE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_PRIVATE_KEY }}
      - name: Get PR branch
        id: pr-branch
        env:
          PR_JSON: ${{ needs.release-please.outputs.pr }}
        run: |
          branch=$(echo "$PR_JSON" | jq -r .headBranchName)
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr-branch.outputs.branch }}
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Sync PATCHLOOM.md
        run: make sync-patchloom-md
      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "PATCHLOOM.md is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PATCHLOOM.md
          git commit -s -m "chore: sync PATCHLOOM.md with version bump"
          git push

      # NOTE: Do NOT edit the release-please PR body. release-please
      # parses its own PR body on merge to detect the release. Replacing
      # the body causes "Pull request body did not match" and the release
      # tag is never created. This step was removed after it broke the
      # v0.5.0 release (run 28121302481). See tech-debt #740.

  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    needs: [release-please]
    # Run when: a tag was pushed (real release), workflow_dispatch, or
    # pull_request (dry-run plan).  NOT on push-to-main: release-please
    # creates the tag on that event, and the resulting tag-push triggers
    # this job via the refs/tags path, avoiding a duplicate build.
    # always() is required because release-please is skipped on non-main
    # events, and GitHub Actions skips dependent jobs when any need is skipped.
    if: >-
      always() && !failure() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       github.event_name == 'pull_request')
    permissions:
      "contents": "write"
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ steps.resolve-tag.outputs.tag }}
      tag-flag: ${{ steps.resolve-tag.outputs.tag && format('--tag={0}', steps.resolve-tag.outputs.tag) || '' }}
      publishing: ${{ steps.resolve-tag.outputs.tag != '' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Resolve release tag
        id: resolve-tag
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.release-please.outputs.tag_name }}" != "" ]]; then
            echo "tag=${{ needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
          ref: ${{ steps.resolve-tag.outputs.tag || github.ref }}
      - name: Install dist
        # Pin the cargo-dist binary by SHA-256 (Scorecard Pinned-Dependencies /
        # downloadThenRun). Avoids unpinned curl|sh of cargo-dist-installer.sh.
        # Version must match dist-workspace.toml cargo-dist-version.
        # Update both the URL version and DIST_SHA256 when bumping dist.
        # SHA from https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/sha256.sum
        shell: bash
        run: |
          set -euo pipefail
          DIST_VERSION=v0.31.0
          DIST_TRIPLE=x86_64-unknown-linux-gnu
          DIST_SHA256=cd355dab0b4c02fb59038fef87655550021d07f45f1d82f947a34ef98560abb8
          ARCHIVE="cargo-dist-${DIST_TRIPLE}.tar.xz"
          URL="https://github.com/axodotdev/cargo-dist/releases/download/${DIST_VERSION}/${ARCHIVE}"
          curl --retry 5 --retry-delay 2 --proto '=https' --tlsv1.2 -LsSf -o "/tmp/${ARCHIVE}" "${URL}"
          echo "${DIST_SHA256}  /tmp/${ARCHIVE}" | sha256sum -c -
          mkdir -p "${HOME}/.cargo/bin"
          tar -xJf "/tmp/${ARCHIVE}" -C /tmp
          install -m 755 "/tmp/cargo-dist-${DIST_TRIPLE}/dist" "${HOME}/.cargo/bin/dist"
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
      - name: Cache dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # Tag refs prepare a real release announcement; other refs only do a plan.
      # This keeps manual branch runs from creating an untagged GitHub Release.
      - id: plan
        # On pull_request (dry-run plan) we allow transient network/cargo-metadata
        # failures in dist plan (see tech-debt #734). The plan is informational for
        # PRs and should not block merge status.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          if [ -n "$TAG" ]; then
            dist plan "--tag=$TAG" --output-format=json > plan-dist-manifest.json
          else
            dist plan --output-format=json > plan-dist-manifest.json
          fi
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          # Write only the ci section (~2KB) to GITHUB_OUTPUT.
          # The full manifest is ~54KB and exceeds the ~50KB silent-drop
          # limit for GitHub Actions step outputs, causing downstream
          # matrix jobs to be skipped.
          echo "manifest=$(jq -c '{ci, announcement_is_prerelease, announcement_title, releases, publish_prereleases}' plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    timeout-minutes: 30
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt).
    # always() prevents transitive skip: release-please is skipped on tag
    # pushes, which transitively skips plan's dependents unless they opt out.
    needs:
      - plan
    if: ${{ always() && !failure() && !cancelled() && fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        # Pin rustup-init by version + SHA-256 (Scorecard Pinned-Dependencies).
        # Avoids unpinned curl|sh of https://sh.rustup.rs.
        # Hashes from https://static.rust-lang.org/rustup/archive/<ver>/<triple>/rustup-init.sha256
        if: ${{ matrix.container }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v cargo > /dev/null 2>&1; then
            exit 0
          fi
          RUSTUP_VERSION=1.29.0
          case "$(uname -m)" in
            x86_64)
              RUSTUP_TRIPLE=x86_64-unknown-linux-gnu
              RUSTUP_SHA256=4acc9acc76d5079515b46346a485974457b5a79893cfb01112423c89aeb5aa10
              ;;
            aarch64|arm64)
              RUSTUP_TRIPLE=aarch64-unknown-linux-gnu
              RUSTUP_SHA256=9732d6c5e2a098d3521fca8145d826ae0aaa067ef2385ead08e6feac88fa5792
              ;;
            *)
              echo "unsupported architecture for pinned rustup-init: $(uname -m)" >&2
              exit 1
              ;;
          esac
          URL="https://static.rust-lang.org/rustup/archive/${RUSTUP_VERSION}/${RUSTUP_TRIPLE}/rustup-init"
          curl --proto '=https' --tlsv1.2 -sSf -o /tmp/rustup-init "${URL}"
          echo "${RUSTUP_SHA256}  /tmp/rustup-init" | sha256sum -c -
          chmod +x /tmp/rustup-init
          /tmp/rustup-init -y --no-modify-path
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    # always() prevents transitive skip from release-please -> plan chain.
    # Still requires plan success and build-local success.
    if: ${{ always() && !cancelled() && needs.plan.result == 'success' && needs.build-local-artifacts.result == 'success' }}
    runs-on: "ubuntu-22.04"
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    permissions:
      "contents": "write"
      "pull-requests": "write"
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && !cancelled() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    timeout-minutes: 20
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Download all build artifacts and the plan manifest from scratch storage
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        id: host
        env:
          PRERELEASE_FLAG: "${{ fromJson(needs.plan.outputs.val).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(needs.plan.outputs.val).announcement_title }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        shell: bash
        run: |
          # Extract release notes from the full plan manifest before cleanup.
          # The full manifest (~54KB) exceeds the GitHub Actions ~50KB step
          # output limit, so we read it from the downloaded artifact file.
          jq -r '.announcement_github_body // empty' artifacts/plan-dist-manifest.json > "$RUNNER_TEMP/notes.txt"
          cp artifacts/plan-dist-manifest.json "$RUNNER_TEMP/plan-dist-manifest.json"

          # Remove manifests so only distributable files are uploaded to the release
          rm -f artifacts/*-dist-manifest.json

          TAG="${{ needs.plan.outputs.tag }}"

          # release-please may have already created the GitHub Release
          # (it creates both the tag and the release when its PR merges).
          # If the release exists, upload artifacts to it; otherwise create it.
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists (created by release-please). Uploading artifacts..."
            gh release upload "$TAG" artifacts/* --clobber
          else
            gh release create "$TAG" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*
          fi

          # Output the slimmed manifest for downstream jobs (full manifest
          # exceeds GitHub Actions ~50KB step output limit)
          echo "manifest=$(jq -c '{ci, announcement_is_prerelease, announcement_title, releases, publish_prereleases}' "$RUNNER_TEMP/plan-dist-manifest.json")" >> "$GITHUB_OUTPUT"
      # If RELEASE_NOTES.md exists at the repo root on the tagged commit,
      # replace the GitHub Release body with its contents. When absent,
      # the auto-generated notes from release-please/cargo-dist stay as-is.
      - name: Apply custom release notes
        env:
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "Custom release notes found, updating release body..."
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
          else
            echo "No custom release notes, using auto-generated notes"
          fi
      # Clean up RELEASE_NOTES.md after the release so it does not persist
      # on main. Branch protection prevents direct pushes, so we create a
      # short-lived PR. A GitHub App token is used so the PR triggers CI
      # and the auto-approve workflow.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: cleanup-token
        with:
          client-id: ${{ vars.AUTO_APPROVE_CLIENT_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_PRIVATE_KEY }}
      - name: Clean up release notes file
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.cleanup-token.outputs.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          if git ls-tree HEAD --name-only | grep -q '^RELEASE_NOTES.md$'; then
            BRANCH="chore/cleanup-release-notes-${TAG}"
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/heads/$BRANCH" \
              -f sha="$(git rev-parse HEAD)"
            FILE_SHA=$(gh api \
              "repos/${{ github.repository }}/contents/RELEASE_NOTES.md?ref=$BRANCH" \
              --jq '.sha')
            gh api --method DELETE \
              "repos/${{ github.repository }}/contents/RELEASE_NOTES.md" \
              -f message="chore: remove release notes override" \
              -f sha="$FILE_SHA" \
              -f branch="$BRANCH"
            PR_URL=$(gh pr create --base main --head "$BRANCH" \
              --title "chore: remove release notes override" \
              --body "Auto-cleanup after ${TAG} release.")
            gh pr merge "$PR_URL" --auto --squash
          fi

  provenance:
    needs:
      - plan
      - host
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Clean non-distributable files
        run: rm -f artifacts/*-dist-manifest.json artifacts/plan-dist-manifest.json
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: artifacts/*
      - name: Download attestation bundles and upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p attestation-bundles
          for artifact in artifacts/*; do
            [ -f "$artifact" ] || continue
            name=$(basename "$artifact")
            # gh attestation download writes to cwd with digest-based names;
            # run it in a temp dir, then rename the output.
            tmpdir=$(mktemp -d)
            pushd "$tmpdir" > /dev/null
            if gh attestation download "$OLDPWD/$artifact" \
              --repo "${{ github.repository }}" 2>/dev/null; then
              for bundle in *.jsonl; do
                [ -f "$bundle" ] || continue
                cp "$bundle" "$OLDPWD/attestation-bundles/${name}.intoto.jsonl"
                break
              done
            fi
            popd > /dev/null
            rm -rf "$tmpdir"
          done
          # Upload all bundle files to the release (Scorecard recognizes .intoto.jsonl)
          if ls attestation-bundles/*.intoto.jsonl 1>/dev/null 2>&1; then
            gh release upload "${{ needs.plan.outputs.tag }}" \
              attestation-bundles/*.intoto.jsonl \
              --clobber
          fi
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Upload SBOM to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.plan.outputs.tag }}" \
            patchloom.cdx.json#patchloom-sbom.cdx.json \
            --clobber

  publish-homebrew-formula:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"
    # always() prevents transitive skip from release-please chain.
    # Do not publish outside the repo while the repository is private.
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && !github.event.repository.private && (!fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          repository: "patchloom/homebrew-tap"
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # So we have access to the formula
      - name: Fetch homebrew formulae
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: Formula/
          merge-multiple: true
      # This is extra complex because you can make your Formula name not match your app name
      # so we need to find releases with a *.rb file, and publish with that filename.
      - name: Commit formula files
        run: |
          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"

          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
            filename=$(echo "$release" | jq '.artifacts[] | select(endswith(".rb"))' --raw-output)
            name=$(echo "$filename" | sed "s/\.rb$//")
            version=$(echo "$release" | jq .app_version --raw-output)

            export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
            brew update
            # We avoid reformatting user-provided data such as the app description and homepage.
            brew style --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict --fix "Formula/${filename}" || true

            git add "Formula/${filename}"
            git commit -m "${name} ${version}"
          done
          git push

  # Push updated Scoop manifest to patchloom/scoop-bucket (version + hashes).
  # The committed JSON is the install source of truth; checkver/autoupdate in
  # the manifest is only a client-side fallback if the bucket lags.
  # Uses HOMEBREW_TAP_TOKEN (classic PAT with public_repo) — same token must
  # be able to push to patchloom/scoop-bucket.
  publish-scoop-bucket:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    timeout-minutes: 15
    env:
      PLAN: ${{ needs.plan.outputs.val }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"
    # always() prevents transitive skip from release-please chain.
    # Do not publish outside the repo while the repository is private.
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && !github.event.repository.private && (!fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout patchloom (manifest generator)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: patchloom
      - name: Checkout scoop-bucket
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "patchloom/scoop-bucket"
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          persist-credentials: true
          path: scoop-bucket
      - name: Fetch release artifacts (sha256 files)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: artifacts/
          merge-multiple: true
      - name: Update and push Scoop manifest
        working-directory: scoop-bucket
        run: |
          set -euo pipefail
          version=$(echo "$PLAN" | jq -r '.releases[0].app_version // empty')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "PLAN had no releases[0].app_version" >&2
            exit 1
          fi
          python3 ../patchloom/scripts/update-scoop-manifest.py \
            --version "$version" \
            --artifacts-dir ../artifacts \
            --output bucket/patchloom.json
          git config user.name "${GITHUB_USER}"
          git config user.email "${GITHUB_EMAIL}"
          git add bucket/patchloom.json
          if git diff --cached --quiet; then
            echo "Scoop manifest already at ${version}; nothing to commit"
            exit 0
          fi
          git commit -m "patchloom ${version}"
          git push

  # Publish cargo-dist generated npm installer package (downloads prebuilt
  # binaries from GitHub Releases at install time).
  # Auth: npm Trusted Publishing (OIDC). No long-lived NPM_TOKEN required.
  # Package settings on npmjs.com: Trusted Publisher = GitHub Actions
  #   owner=patchloom repo=patchloom workflow=release.yml (filename only).
  # Requires Node >= 22.14 and npm CLI >= 11.5.1 for OIDC.
  publish-npm:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
    # always() prevents transitive skip from release-please chain.
    # Do not publish outside the repo while the repository is private.
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && !github.event.repository.private && (!fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Fetch npm packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: npm/
          merge-multiple: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Trusted publishing: Node >= 22.14, npm CLI >= 11.5.1.
          # Node 24.5+ ships npm >= 11.5.1 (current 24.x has 11.16+). Prefer the
          # bundled CLI over `npm install -g npm@...` so Scorecard Pinned-
          # Dependencies does not flag an unhashed npmCommand (alert #45).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Verify npm CLI supports OIDC trusted publishing
        run: |
          set -euo pipefail
          node --version
          npm --version
          # Floor: npm 11.5.1 (OIDC trusted publishing). Fail closed if setup-node
          # ever hands us an older CLI instead of mutating the install unpinned.
          node -e "
            const v = require('child_process').execSync('npm -v', {encoding:'utf8'}).trim();
            const [a,b,c] = v.split('.').map(Number);
            const ok = a > 11 || (a === 11 && (b > 5 || (b === 5 && c >= 1)));
            if (!ok) {
              console.error('npm ' + v + ' is below 11.5.1 (OIDC trusted publishing floor)');
              process.exit(1);
            }
            console.log('npm ' + v + ' meets OIDC floor (>= 11.5.1)');
          "
      - name: Publish npm package
        run: |
          set -euo pipefail
          # OIDC: npm CLI exchanges the GitHub Actions id-token for a short-lived
          # publish credential. Do not set NODE_AUTH_TOKEN here (empty tokens
          # can override OIDC). Optional emergency fallback: set NPM_TOKEN and
          # export NODE_AUTH_TOKEN only in a temporary override if OIDC fails.
          #
          # Inject mcpName for official MCP Registry ownership verification
          # (https://github.com/modelcontextprotocol/registry package-types).
          # cargo-dist does not emit this field; inject before publish so each
          # npm version can be listed as io.github.patchloom/patchloom.
          MCP_REGISTRY_NAME="io.github.patchloom/patchloom"
          published=0
          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith("-npm-package.tar.gz")] | any)'); do
            pkg=$(echo "$release" | jq '.artifacts[] | select(endswith("-npm-package.tar.gz"))' --raw-output)
            tarball="./npm/${pkg}"
            work=$(mktemp -d)
            tar -xzf "$tarball" -C "$work"
            if [ ! -f "$work/package/package.json" ]; then
              echo "npm tarball missing package/package.json: ${pkg}" >&2
              rm -rf "$work"
              exit 1
            fi
            jq --arg name "$MCP_REGISTRY_NAME" '.mcpName = $name' \
              "$work/package/package.json" > "$work/package/package.json.tmp"
            mv "$work/package/package.json.tmp" "$work/package/package.json"
            # Re-pack with the same top-level package/ directory layout.
            tar -czf "$tarball" -C "$work" package
            rm -rf "$work"
            echo "Publishing ${tarball} via OIDC trusted publishing (mcpName=${MCP_REGISTRY_NAME})"
            npm publish --access public "$tarball"
            published=$((published + 1))
          done
          if [ "$published" -eq 0 ]; then
            echo "No *-npm-package.tar.gz artifacts in PLAN; nothing to publish."
          fi

  custom-publish-crates:
    needs:
      - plan
      - host
    # always() prevents transitive skip from release-please chain.
    # Do not publish outside the repo while the repository is private.
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && !github.event.repository.private && (!fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases) }}
    uses: ./.github/workflows/publish-crates.yml
    with:
      plan: ${{ needs.plan.outputs.val }}
    secrets: inherit
    # publish jobs get escalated permissions
    permissions:
      "contents": "read"
      "id-token": "write"
      "packages": "write"

  # Publish Chocolatey Community package (portable zip from GitHub Releases).
  # Soft-skip push when CHOCOLATEY_API_KEY is unset (pack still validates).
  # First listing is subject to community.chocolatey.org moderation.
  publish-chocolatey:
    needs:
      - plan
      - host
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PLAN: ${{ needs.plan.outputs.val }}
    if: ${{ always() && !cancelled() && needs.host.result == 'success' && !github.event.repository.private && (!fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases) }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch release artifacts (sha256 files)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-*
          path: artifacts/
          merge-multiple: true

      - name: Update Chocolatey package metadata
        shell: bash
        run: |
          set -euo pipefail
          version=$(echo "$PLAN" | jq -r '.releases[0].app_version // empty')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "PLAN had no releases[0].app_version" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_ENV"
          python3 scripts/update-chocolatey-package.py \
            --version "$version" \
            --artifacts-dir artifacts \
            --package-dir chocolatey

      - name: Pack nupkg
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          choco pack chocolatey/patchloom.nuspec --outputdirectory dist
          Get-ChildItem dist/*.nupkg | ForEach-Object { Write-Host "Packed $($_.Name)" }

      - name: Push to chocolatey.org
        # Push can 403 on first community package (moderation / key scope) while
        # pack succeeded. Soft-fail so host + other channels still green the
        # release workflow (0.14.0: 403 failed the whole Release run).
        continue-on-error: true
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:CHOCOLATEY_API_KEY)) {
            Write-Host "CHOCOLATEY_API_KEY not set; pack-only (no push)"
            exit 0
          }
          $nupkg = Get-ChildItem dist/patchloom.*.nupkg | Select-Object -First 1
          if (-not $nupkg) {
            throw "No nupkg found under dist/"
          }
          Write-Host "Pushing $($nupkg.Name) to push.chocolatey.org"
          choco push $nupkg.FullName `
            --source 'https://push.chocolatey.org/' `
            --api-key $env:CHOCOLATEY_API_KEY `
            --force
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::choco push failed exit=$LASTEXITCODE (community moderation or API key); nupkg was packed"
            exit $LASTEXITCODE
          }

  announce:
    needs:
      - plan
      - host
      - publish-homebrew-formula
      - publish-scoop-bucket
      - publish-npm
      - publish-chocolatey
      - custom-publish-crates
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' && (needs.publish-homebrew-formula.result == 'skipped' || needs.publish-homebrew-formula.result == 'success') && (needs.publish-scoop-bucket.result == 'skipped' || needs.publish-scoop-bucket.result == 'success') && (needs.publish-npm.result == 'skipped' || needs.publish-npm.result == 'success') && (needs.publish-chocolatey.result == 'skipped' || needs.publish-chocolatey.result == 'success') && (needs.custom-publish-crates.result == 'skipped' || needs.custom-publish-crates.result == 'success') }}
    runs-on: "ubuntu-22.04"
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
