name: Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 1"  # Monday 1:30am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    name: OpenSSF Scorecard
    # Scorecard SARIF upload requires GitHub Advanced Security (free for
    # public repos). This job auto-activates when the repo goes public.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
