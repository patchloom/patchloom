name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group: {}
  schedule:
    - cron: "0 6 * * 1"  # Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Create isolated Docker config for Trivy
        run: mkdir -p "$RUNNER_TEMP/trivy-docker"

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: "ghcr.io/aquasecurity/trivy-db:2"
          DOCKER_CONFIG: "${{ runner.temp }}/trivy-docker"

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          bindir="${RUNNER_TEMP}/gitleaks-bin"
          mkdir -p "$bindir"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  platform="linux_x64" ;;
            Linux-aarch64) platform="linux_arm64" ;;
            Darwin-x86_64) platform="darwin_x64" ;;
            Darwin-arm64)  platform="darwin_arm64" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          curl --retry 5 --retry-all-errors --retry-delay 2 -sSfL \
            -o "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${platform}.tar.gz"
          tar -xzf "$archive" -C "$bindir" gitleaks
          printf '%s\n' "$bindir" >> "$GITHUB_PATH"
      - run: gitleaks detect --source . --exit-code 1

  codeql:
    name: CodeQL
    # CodeQL requires GitHub Advanced Security, which is free for public
    # repos only. This job auto-activates when the repo goes public.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, python]
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-review:
    name: Dependency Review
    # Dependency review requires GitHub Advanced Security for private repos.
    if: ${{ github.event_name == 'pull_request' && !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
