name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group: {}
  schedule:
    - cron: "0 6 * * 1"  # Monday 6am UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'Cargo.*'
              - 'tests/**'
              - 'scripts/**'
              - '.github/**'
              - 'fuzz/**'
              - 'benches/**'

  trivy:
    name: Trivy
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Create isolated Docker config for Trivy
        run: mkdir -p "$RUNNER_TEMP/trivy-docker"

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: "ghcr.io/aquasecurity/trivy-db:2"
          DOCKER_CONFIG: "${{ runner.temp }}/trivy-docker"

  gitleaks:
    name: Gitleaks
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          archive="${RUNNER_TEMP}/gitleaks.tar.gz"
          bindir="${RUNNER_TEMP}/gitleaks-bin"
          mkdir -p "$bindir"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  platform="linux_x64" ;;
            Linux-aarch64) platform="linux_arm64" ;;
            Darwin-x86_64) platform="darwin_x64" ;;
            Darwin-arm64)  platform="darwin_arm64" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          curl --retry 5 --retry-all-errors --retry-delay 2 -sSfL \
            -o "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${platform}.tar.gz"
          tar -xzf "$archive" -C "$bindir" gitleaks
          printf '%s\n' "$bindir" >> "$GITHUB_PATH"
      - run: gitleaks detect --source . --exit-code 1

  codeql-run:
    name: CodeQL Run
    needs: [changes]
    if: >-
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true') &&
      !github.event.repository.private
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, python]
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-review:
    name: Dependency Review
    needs: [changes]
    # Dependency review requires GitHub Advanced Security for private repos.
    if: >-
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.code == 'true') &&
      github.event_name == 'pull_request' &&
      !github.event.repository.private
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5

  codeql-gate:
    # Lightweight gate satisfying the "CodeQL (actions)" and "CodeQL (python)"
    # required checks. Passes when the real scan succeeds OR was skipped
    # (docs-only PR or private repo).
    name: "CodeQL (${{ matrix.language }})"
    needs: [codeql-run]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    strategy:
      matrix:
        language: [actions, python]
    steps:
      - name: Gate
        run: |
          if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
            echo "CodeQL scan failed or was cancelled"
            exit 1
          fi
        env:
          RESULT: ${{ needs.codeql-run.result }}
