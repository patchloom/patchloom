name: Stale

on:
  schedule:
    - cron: "0 0 * * *"  # Daily midnight UTC
  workflow_dispatch:

concurrency:
  group: stale
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stale:
    name: Close Stale Issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had activity in the last 60 days. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please
            leave a comment.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had activity in the last 60 days. It will be closed in 14
            days if no further activity occurs. If this PR is still relevant,
            please leave a comment or push an update.
          close-issue-message: "Closed as stale. Feel free to reopen if this is still relevant."
          close-pr-message: "Closed as stale. Feel free to reopen if this is still relevant."
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,tech-debt,enhancement"
          exempt-pr-labels: "pinned,security"
