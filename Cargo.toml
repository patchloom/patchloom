[package]
name = "patchloom"
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
description = "A Rust CLI for agent-grade repo operations"
license = "MIT OR Apache-2.0"
repository = "https://github.com/patchloom/patchloom"
homepage = "https://github.com/patchloom/patchloom"
readme = "README.md"
keywords = ["cli", "agents", "patch", "markdown", "config"]

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml_ng = "0.10"
toml_edit = { version = "0.25", features = ["serde"] }
ignore = "0.4"
globset = "0.4"
memchr = "2"
rayon = "1"
regex = "1"
similar = { version = "3", features = ["text"] }
tempfile = "3"
anyhow = "1"
ec4rs = "1"
clap_complete = "4.4.10"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

# The profile that 'dist' will build with
[profile.release]
strip = true
lto = "thin"

[profile.dist]
inherits = "release"
