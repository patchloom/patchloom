<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- V2: 4x4 extra bold, larger rounding -->
  <rect width="512" height="512" rx="80" ry="80" fill="#0d1b2a"/>

  <g font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-weight="900" font-size="90" text-anchor="middle" dominant-baseline="central">
    <!-- Row 1 -->
    <text x="121" y="121" fill="#5b8db8">+</text>
    <text x="211" y="121" fill="#5b8db8">-</text>
    <text x="301" y="121" fill="#c9a84c">@</text>
    <text x="391" y="121" fill="#5b8db8">+</text>
    <!-- Row 2 -->
    <text x="121" y="211" fill="#c9a84c">-</text>
    <text x="211" y="211" fill="#c9a84c">+</text>
    <text x="301" y="211" fill="#5b8db8">+</text>
    <text x="391" y="211" fill="#5b8db8">-</text>
    <!-- Row 3 -->
    <text x="121" y="301" fill="#5b8db8">+</text>
    <text x="211" y="301" fill="#c9a84c">@</text>
    <text x="301" y="301" fill="#c9a84c">-</text>
    <text x="391" y="301" fill="#5b8db8">+</text>
    <!-- Row 4 -->
    <text x="121" y="391" fill="#5b8db8">-</text>
    <text x="211" y="391" fill="#5b8db8">+</text>
    <text x="301" y="391" fill="#5b8db8">+</text>
    <text x="391" y="391" fill="#c9a84c">-</text>
  </g>
</svg>